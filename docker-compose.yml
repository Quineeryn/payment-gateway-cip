version: '3.8'

services:
  # Database Service
  db:
    image: postgres:16-alpine
    container_name: payment-gateway-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-payment_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-payment_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  # Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-gateway-app
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-payment_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      COREBANK_SERVICE_URL: http://localhost:8080
      BILLER_SERVICE_URL: http://localhost:8080
    networks:
      - payment-network

  # Kafka Infrastructure (Optional - use --profile optional to start)
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: payment-zookeeper
    profiles: ["optional"]
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - payment-network

  kafka:
    image: bitnami/kafka:latest
    container_name: payment-kafka
    profiles: ["optional"]
    depends_on:
      - zookeeper
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_ANONYMOUS_LOGIN=yes
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    networks:
      - payment-network

networks:
  payment-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
