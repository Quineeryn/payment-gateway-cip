# Application
spring.application.name=payment-gateway
server.port=8080

# Database (Env overrides for Docker, Local fallback)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Exclude Kafka if disabled
spring.autoconfigure.exclude=${KAFKA_AUTO_CONFIG_EXCLUDE:org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration}

# External Services (Points to self for Mocking)
corebank.service.url=${COREBANK_SERVICE_URL:http://localhost:8080}
biller.service.url=${BILLER_SERVICE_URL:http://localhost:8080}

# Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.billerService.sliding-window-size=5
resilience4j.circuitbreaker.instances.billerService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.billerService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.billerService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.billerService.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j - Retry
resilience4j.retry.instances.billerService.max-attempts=3
resilience4j.retry.instances.billerService.wait-duration=1s
resilience4j.retry.instances.billerService.retry-exceptions=feign.FeignException

# Actuator & Monitoring
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Logging
logging.level.com.payment=INFO
logging.level.org.springframework.web=INFO

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Feature Flags
app.kafka.enabled=${KAFKA_ENABLED:false}

# General
spring.main.allow-bean-definition-overriding=true